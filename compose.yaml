services:
  viewer:
    profiles: [production]
    build:
      context: .
      target: runtime
    ports:
      - "8080:80"

  viewer-dev:
    profiles: [dev]
    build:
      context: .
      target: development
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules

  viewer-test:
    profiles: [test]
    build:
      context: .
      target: test
    init: true
    ipc: host
    volumes:
      - .:/app
      - test_node_modules:/app/node_modules

volumes:
  dev_node_modules:
  test_node_modules:
